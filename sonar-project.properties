sonar.projectKey=dvershinin_fds
sonar.organization=dvershinin

# Restrict scanner scope to the Python sources + tests.
sonar.sources=fds,cds
sonar.tests=tests
sonar.python.version=2.7,3.6,3.11
sonar.exclusions=**/__pycache__/**,fds/__about__.py

# Ignore "missing lock file" finding on pyproject.toml.
# This project uses setup.py + setuptools_scm (RPM-packaged), not Poetry or uv,
# so it has no lock file by design. The pyproject.toml here only carries
# [build-system] + [tool.*] config (no [project.dependencies] block), so the
# missing-lock-file warning is a false positive.
sonar.issue.ignore.multicriteria=lockfile
sonar.issue.ignore.multicriteria.lockfile.ruleKey=text:S8565
sonar.issue.ignore.multicriteria.lockfile.resourceKey=pyproject.toml

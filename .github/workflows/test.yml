name: Super-Linter

# Run this workflow on every push and on PRs targeting master so PR checks gate merging.
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # Python 2.7 syntax/import check using CentOS 7 container
  test-py27:
    name: Python 2.7 compatibility check
    runs-on: ubuntu-latest
    container:
      image: getpagespeed/lts:el7
    steps:
      - name: Install git
        run: yum -y install git

      - name: Clone repository
        run: |
          if [ -n "${{ github.head_ref }}" ]; then
            git clone --depth 1 --branch "${{ github.head_ref }}" https://github.com/${{ github.repository }}.git .
          else
            git clone --depth 1 --branch "${{ github.ref_name }}" https://github.com/${{ github.repository }}.git .
          fi

      - name: Verify Python 2.7 syntax
        run: |
          echo '__version__ = "0.0.0"' > fds/__about__.py
          python2 -m py_compile fds/Country.py fds/WebClient.py fds/FirewallWrapper.py fds/fds.py fds/Countries.py fds/Config.py fds/utils.py fds/config_funcs.py cds/CloudflareWrapper.py
          echo "All Python 2.7 syntax checks passed"

  # Python 3 unit tests (mocked, no network/firewalld required)
  test-py3-unit:
    name: Python 3 unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest mock six netaddr 'cloudflare>=2.7.1,<2.20' appdirs
      - name: Run unit tests
        run: pytest tests/test_cloudflare_wrapper.py tests/test_py2_compat.py -v

  # Integration test with firewalld using system packages
  # This test is optional - package dependencies from noarch repo may be incomplete
  test:
    name: Integration test
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: getpagespeed/lts:el7
    steps:
      - name: Install fds from GetPageSpeed repo
        run: |
          yum -y install epel-release
          yum -y install https://extras.getpagespeed.com/release-latest.rpm
          yum-config-manager --disable getpagespeed-extras
          yum -y install fds git python2-filelock

      - name: Clone repository
        run: git clone --depth 1 --branch ${{ github.ref_name }} https://github.com/${{ github.repository }}.git .

      - name: Ensure fds required directories
        run: mkdir -p /var/cache/fds /var/lib/fds

      - name: Start dbus and firewalld
        run: |
          mkdir -p /var/run/dbus /run/lock
          dbus-uuidgen --ensure || true
          dbus-daemon --system --fork || true
          firewalld --nofork &
          sleep 3
          firewall-cmd --state || echo "firewalld not running, skipping integration tests"

      - name: Test IP unblock first
        run: fds unblock 1.2.3.4 || true

      - name: Test IP block
        run: fds block 1.2.3.4

      - name: Test country block
        run: fds block China

      - name: Test cron for sets updating
        run: fds cron

      - name: Unblock a country
        run: fds unblock China
